<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Gain Plugin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Simple Gain</h1>
        <div class="plugin-interface">
            <div class="knob-container">
                <svg id="knob" width="150" height="150" viewBox="0 0 150 150">
                    <circle cx="75" cy="75" r="60" class="knob-bg"/>
                    <circle cx="75" cy="75" r="60" class="knob-progress" id="knobProgress"/>
                    <circle cx="75" cy="75" r="50" class="knob-inner"/>
                    <line x1="75" y1="75" x2="75" y2="30" class="knob-indicator" id="knobIndicator"/>
                </svg>
                <div class="knob-label">Gain</div>
                <div class="knob-value" id="gainValue">50%</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
